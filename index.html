<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zest & Zyme | Discover Recipes</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', 
            theme: {
                extend: {
                    colors: {
                        brand: { 
                            sage: '#7C9473', 
                            leaf: '#4A6141', 
                            terracotta: '#E67E5F', 
                            slate: '#2D3436', 
                            cream: '#FDFCF8', 
                            bg: '#F8FAF9',
                            darkBg: '#121516', 
                            darkCard: '#1E2324' 
                        }
                    },
                    fontFamily: {
                        display: ['Fredoka', 'sans-serif'],
                        body: ['Quicksand', 'sans-serif']
                    }
                }
            }
        }

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        html { scrollbar-width: none; -ms-overflow-style: none; transition: background-color 0.5s ease; }

        body {
            background-image: radial-gradient(rgba(124, 148, 115, 0.15) 1px, transparent 1px);
            background-size: 24px 24px;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            transition: background-color 0.6s ease, color 0.6s ease;
        }

        #header-section { transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

        /* FIX: 100dvh use for exact device view height */
        .state-initial {
            min-height: 100vh;
            min-height: 100dvh; 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 0 1rem;
        }

        .state-active {
            min-height: auto; position: sticky; top: 0; z-index: 50;
            padding-top: 1.25rem; padding-bottom: 1.25rem;
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        }

        .water-fill-active {
            transform: translateY(0%) !important;
        }

        .fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader {
            border: 3px solid transparent; border-top: 3px solid white;
            border-radius: 50%; width: 20px; height: 20px;
            animation: spin 1s linear infinite; display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        input:focus { outline: none; }
    </style>
</head>

<body class="font-body text-brand-slate bg-brand-bg dark:bg-brand-darkBg dark:text-brand-cream antialiased">

    <header id="header-section" class="state-initial w-full bg-white/0 dark:bg-brand-darkBg/0 border-b border-transparent [&.state-active]:bg-brand-bg/85 [&.state-active]:dark:bg-brand-darkBg/85 [&.state-active]:border-brand-sage/15 [&.state-active]:dark:border-brand-sage/10">
        
        <div id="logo-container" class="text-center mb-8 md:mb-10 transition-all duration-500 w-full">
            <h1 class="font-display text-5xl md:text-7xl font-extrabold text-brand-leaf dark:text-brand-sage tracking-tighter uppercase transition-colors">Zest & Zyme</h1>
            <p class="text-brand-sage mt-2 md:mt-3 font-medium text-base md:text-lg italic dark:text-brand-cream/70 transition-colors">Discover your next favorite meal...</p>
        </div>

        <div class="w-full max-w-4xl mx-auto px-4 md:px-0 relative flex justify-center">
            <div class="w-full flex items-center justify-center gap-3 md:gap-4 transition-all duration-500">
                
                <div id="back-btn-wrapper" class="relative group hidden flex-shrink-0">
                    <button onclick="backToList()" class="w-12 h-12 md:w-14 md:h-14 flex items-center justify-center bg-white dark:bg-brand-darkCard border-2 border-brand-sage/30 dark:border-white/10 rounded-full shadow-lg hover:shadow-xl text-brand-slate dark:text-brand-cream hover:border-brand-sage dark:hover:border-brand-sage transition-all duration-300 transform hover:-translate-x-1">
                        <svg class="w-6 h-6 md:w-7 md:h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                        </svg>
                    </button>
                    <span class="absolute top-full mt-3 left-1/2 -translate-x-1/2 px-3 py-1.5 bg-brand-slate dark:bg-white text-white dark:text-brand-slate text-xs font-bold rounded-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 shadow-xl whitespace-nowrap z-50 pointer-events-none">
                        Back to results
                        <span class="absolute bottom-full left-1/2 -translate-x-1/2 border-[5px] border-transparent border-b-brand-slate dark:border-b-white"></span>
                    </span>
                </div>

                <div class="relative flex-1 max-w-2xl">
                    <div class="relative flex items-center bg-white dark:bg-brand-darkCard border-2 border-brand-sage/30 dark:border-white/10 rounded-full shadow-lg p-1.5 transition-all hover:shadow-xl focus-within:border-brand-sage dark:focus-within:border-brand-sage/60 focus-within:ring-4 focus-within:ring-brand-sage/10">
                        <input type="text" id="search-input" placeholder="Search e.g. cake..."
                            class="w-full pl-5 md:pl-6 pr-3 py-2.5 md:py-3 bg-transparent text-base md:text-lg font-medium text-brand-slate dark:text-white placeholder-brand-slate/40 dark:placeholder-white/40"
                            autocomplete="off">
                        <button onclick="fetchRecipe()"
                            class="h-full px-6 md:px-8 py-2.5 md:py-3 bg-brand-leaf hover:bg-brand-sage dark:hover:bg-brand-sage text-white rounded-full font-bold transition-colors flex items-center justify-center gap-2 flex-shrink-0 text-sm md:text-base">
                            <span id="btn-text">Search</span>
                            <div id="loader" class="loader"></div>
                        </button>
                    </div>
                    
                    <div id="error-message" class="hidden absolute left-0 right-0 top-full mt-4 mx-4 md:mx-0 px-4 py-3 bg-brand-terracotta/10 border border-brand-terracotta/20 text-brand-terracotta rounded-xl text-sm font-bold text-center transition-all shadow-sm">
                    </div>
                </div>

                <div class="relative group flex-shrink-0 hidden md:block">
                    <button id="theme-btn-desktop" class="relative overflow-hidden w-14 h-14 flex items-center justify-center bg-white dark:bg-brand-darkCard border-2 border-brand-sage/30 dark:border-white/10 rounded-full shadow-lg transition-all hover:shadow-xl">
                        <div id="water-level-desktop" class="absolute bottom-0 left-0 w-full h-full transform translate-y-full transition-transform duration-[600ms] ease-in-out z-0 rounded-full"></div>
                        
                        <svg id="icon-sun-desktop" class="w-7 h-7 text-white dark:text-yellow-400 relative z-10 transition-transform duration-500 group-hover:rotate-45 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                        </svg>
                        
                        <svg id="icon-moon-desktop" class="w-7 h-7 text-brand-slate relative z-10 transition-transform duration-500 group-hover:-rotate-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                        </svg>
                    </button>
                    <span class="absolute top-full mt-3 left-1/2 -translate-x-1/2 px-3 py-1.5 bg-brand-slate dark:bg-white text-white dark:text-brand-slate text-xs font-bold rounded-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 shadow-xl whitespace-nowrap z-50 pointer-events-none">
                        Toggle Theme
                        <span class="absolute bottom-full left-1/2 -translate-x-1/2 border-[5px] border-transparent border-b-brand-slate dark:border-b-white"></span>
                    </span>
                </div>

            </div>
        </div>
    </header>

    <main class="w-full max-w-5xl mx-auto px-3 md:px-6 pb-20 pt-6 relative">
        <div id="recipe-list-container" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 md:gap-6"></div>
        <div id="recipe-detail-container" class="hidden w-full">
            <div id="full-recipe-content" class="w-full"></div>
        </div>
    </main>

    <button id="theme-btn-mobile" class="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-20 h-10 p-1 flex items-center bg-white dark:bg-brand-darkCard border-2 border-brand-sage/30 dark:border-white/10 rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.15)] dark:shadow-[0_8px_30px_rgba(255,255,255,0.08)] overflow-hidden z-[60]">
        <div id="water-level-mobile" class="absolute bottom-0 left-0 w-full h-full transform translate-y-full transition-transform duration-[600ms] ease-in-out z-0 rounded-full"></div>
        
        <div id="thumb-mobile" class="relative z-10 w-8 h-8 rounded-full flex items-center justify-center transition-transform duration-500 ease-[cubic-bezier(0.34,1.56,0.64,1)] transform translate-x-0 bg-brand-slate/5 dark:bg-black/20">
            <svg id="icon-sun-mobile" class="w-5 h-5 text-white dark:text-yellow-400 absolute transition-all duration-500 opacity-0 scale-50 rotate-[-90deg]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
            <svg id="icon-moon-mobile" class="w-5 h-5 text-brand-slate absolute transition-all duration-500 opacity-100 scale-100 rotate-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
        </div>
    </button>

    <script>
        // ==========================================
        // THEME & WATER ANIMATION LOGIC (Synced for Desktop & Mobile)
        // ==========================================
        const themeBtnDesktop = document.getElementById('theme-btn-desktop');
        const waterLevelDesktop = document.getElementById('water-level-desktop');
        const iconSunDesktop = document.getElementById('icon-sun-desktop');
        const iconMoonDesktop = document.getElementById('icon-moon-desktop');

        const themeBtnMobile = document.getElementById('theme-btn-mobile');
        const waterLevelMobile = document.getElementById('water-level-mobile');
        const thumbMobile = document.getElementById('thumb-mobile');
        const iconSunMobile = document.getElementById('icon-sun-mobile');
        const iconMoonMobile = document.getElementById('icon-moon-mobile');
        
        const html = document.documentElement;

        // Initialize Icons & Mobile Thumb Position on Load
        if (html.classList.contains('dark')) {
            iconMoonDesktop.classList.add('hidden');
            iconSunDesktop.classList.remove('hidden');
            
            thumbMobile.classList.replace('translate-x-0', 'translate-x-10'); // Slide Right
            iconMoonMobile.classList.replace('opacity-100', 'opacity-0');
            iconMoonMobile.classList.replace('scale-100', 'scale-50');
            iconMoonMobile.classList.replace('rotate-0', 'rotate-[90deg]');
            iconSunMobile.classList.replace('opacity-0', 'opacity-100');
            iconSunMobile.classList.replace('scale-50', 'scale-100');
            iconSunMobile.classList.replace('rotate-[-90deg]', 'rotate-0');
        }

        function toggleTheme() {
            if (themeBtnDesktop.disabled) return; 
            themeBtnDesktop.disabled = true;
            themeBtnMobile.disabled = true;

            const isDark = html.classList.contains('dark');
            const waterColorClass = isDark ? 'bg-brand-slate' : 'bg-yellow-400';
            
            // Set Water Colors for both buttons
            waterLevelDesktop.className = `absolute bottom-0 left-0 w-full h-full transform translate-y-full transition-transform duration-[600ms] ease-in-out z-0 rounded-full ${waterColorClass}`;
            waterLevelMobile.className = `absolute bottom-0 left-0 w-full h-full transform translate-y-full transition-transform duration-[600ms] ease-in-out z-0 rounded-full ${waterColorClass}`;
            
            void waterLevelDesktop.offsetWidth; // Force repaint
            void waterLevelMobile.offsetWidth;
            
            // Trigger Water Animation
            waterLevelDesktop.classList.add('water-fill-active');
            waterLevelMobile.classList.add('water-fill-active');

            setTimeout(() => {
                if (isDark) {
                    html.classList.remove('dark');
                    localStorage.theme = 'light';
                    
                    // Desktop Update
                    iconSunDesktop.classList.add('hidden');
                    iconMoonDesktop.classList.remove('hidden');
                    
                    // Mobile Slide & Icon Fade (Left)
                    thumbMobile.classList.replace('translate-x-10', 'translate-x-0');
                    iconSunMobile.classList.replace('opacity-100', 'opacity-0');
                    iconSunMobile.classList.replace('scale-100', 'scale-50');
                    iconSunMobile.classList.replace('rotate-0', 'rotate-[90deg]');
                    iconMoonMobile.classList.replace('opacity-0', 'opacity-100');
                    iconMoonMobile.classList.replace('scale-50', 'scale-100');
                    iconMoonMobile.classList.replace('rotate-[-90deg]', 'rotate-0');

                } else {
                    html.classList.add('dark');
                    localStorage.theme = 'dark';
                    
                    // Desktop Update
                    iconMoonDesktop.classList.add('hidden');
                    iconSunDesktop.classList.remove('hidden');
                    
                    // Mobile Slide & Icon Fade (Right)
                    thumbMobile.classList.replace('translate-x-0', 'translate-x-10');
                    iconMoonMobile.classList.replace('opacity-100', 'opacity-0');
                    iconMoonMobile.classList.replace('scale-100', 'scale-50');
                    iconMoonMobile.classList.replace('rotate-0', 'rotate-[-90deg]');
                    iconSunMobile.classList.replace('opacity-0', 'opacity-100');
                    iconSunMobile.classList.replace('scale-50', 'scale-100');
                    iconSunMobile.classList.replace('rotate-[90deg]', 'rotate-0');
                }

                // Drain Water after theme changes
                setTimeout(() => {
                    waterLevelDesktop.style.opacity = '0';
                    waterLevelMobile.style.opacity = '0';
                    waterLevelDesktop.style.transition = 'opacity 0.4s ease';
                    waterLevelMobile.style.transition = 'opacity 0.4s ease';
                    
                    setTimeout(() => {
                        waterLevelDesktop.classList.remove('water-fill-active');
                        waterLevelMobile.classList.remove('water-fill-active');
                        waterLevelDesktop.style.opacity = '1';
                        waterLevelMobile.style.opacity = '1';
                        waterLevelDesktop.style.transition = ''; 
                        waterLevelMobile.style.transition = ''; 
                        themeBtnDesktop.disabled = false;
                        themeBtnMobile.disabled = false;
                    }, 400);
                }, 100);

            }, 600); 
        }

        themeBtnDesktop.addEventListener('click', toggleTheme);
        themeBtnMobile.addEventListener('click', toggleTheme);

        // ==========================================
        // RECIPE API LOGIC
        // ==========================================
        let currentMeals = [];

        function showError(message) {
            const errorContainer = document.getElementById('error-message');
            errorContainer.textContent = message;
            errorContainer.classList.remove('hidden');
            setTimeout(() => { errorContainer.classList.add('hidden'); }, 5000);
        }

        async function fetchRecipe() {
            const rawQuery = document.getElementById('search-input').value.trim();
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btn-text');
            const headerSection = document.getElementById('header-section');
            const logoContainer = document.getElementById('logo-container');
            const detailContainer = document.getElementById('recipe-detail-container');
            const backBtnWrapper = document.getElementById('back-btn-wrapper');

            if (!rawQuery) {
                showError("Please enter a recipe name to search.");
                return;
            }

            loader.style.display = 'block';
            btnText.style.display = 'none';
            document.getElementById('error-message').classList.add('hidden');

            backBtnWrapper.classList.add('hidden');
            backBtnWrapper.classList.remove('flex');

            try {
                const response = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${encodeURIComponent(rawQuery)}`);
                if (!response.ok) throw new Error(`Server status: ${response.status}`);

                const data = await response.json();

                if (data.meals && data.meals.length > 0) {
                    currentMeals = data.meals.slice(0, 6);

                    headerSection.classList.remove('state-initial');
                    headerSection.classList.add('state-active');
                    logoContainer.classList.add('hidden');
                    detailContainer.classList.add('hidden');

                    setTimeout(() => {
                        renderList(rawQuery);
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }, 100);

                } else {
                    showError(`No recipe found for "${rawQuery}". Try 'Pancakes' or 'Chicken'.`);
                }
            } catch (error) {
                console.error("API Error:", error);
                showError(`System Error: ${error.message}`);
            } finally {
                loader.style.display = 'none';
                btnText.style.display = 'block';
            }
        }

        function renderList(query) {
            const listContainer = document.getElementById('recipe-list-container');
            listContainer.innerHTML = '';

            const titleHTML = `
                <div class="col-span-1 md:col-span-2 lg:col-span-3 mb-1 md:mb-2 fade-in-up px-1">
                    <h2 class="font-display text-2xl font-bold text-brand-slate dark:text-white transition-colors">Top results for <span class="text-brand-leaf dark:text-brand-sage">"${query}"</span></h2>
                    <p class="text-brand-sage dark:text-brand-cream/70 text-sm mt-1 font-medium transition-colors">Found ${currentMeals.length} delicious options.</p>
                </div>
            `;
            listContainer.innerHTML += titleHTML;

            currentMeals.forEach((meal, index) => {
                const delay = index * 100;
                const cardHTML = `
                    <div onclick="showFullRecipe('${meal.idMeal}')" class="group cursor-pointer bg-white dark:bg-brand-darkCard rounded-3xl md:rounded-[2rem] overflow-hidden shadow-sm hover:shadow-2xl transition-all duration-300 border border-brand-sage/10 dark:border-white/10 hover:border-brand-sage/30 dark:hover:border-white/30 fade-in-up w-full" style="animation-delay: ${delay}ms;">
                        <div class="h-52 md:h-56 overflow-hidden relative w-full">
                            <img src="${meal.strMealThumb}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent"></div>
                            <span class="absolute bottom-4 left-4 text-white font-bold tracking-widest text-[10px] uppercase bg-brand-terracotta px-3 py-1.5 rounded-full shadow-lg">${meal.strCategory}</span>
                        </div>
                        <div class="p-5 md:p-6">
                            <h3 class="font-display font-bold text-lg md:text-xl text-brand-slate dark:text-white group-hover:text-brand-leaf dark:group-hover:text-brand-sage transition-colors line-clamp-1">${meal.strMeal}</h3>
                            <p class="text-xs md:text-sm text-brand-sage dark:text-brand-cream/70 mt-2 md:mt-3 font-semibold flex items-center gap-2 transition-colors">
                                View Full Recipe 
                                <svg class="w-4 h-4 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                            </p>
                        </div>
                    </div>
                `;
                listContainer.innerHTML += cardHTML;
            });

            listContainer.classList.remove('hidden');
        }

        function showFullRecipe(idMeal) {
            const meal = currentMeals.find(m => m.idMeal === idMeal);
            if (!meal) return;

            const backBtnWrapper = document.getElementById('back-btn-wrapper');
            backBtnWrapper.classList.remove('hidden');
            backBtnWrapper.classList.add('flex');

            document.getElementById('recipe-list-container').classList.add('hidden');
            const detailContainer = document.getElementById('recipe-detail-container');
            const contentDiv = document.getElementById('full-recipe-content');

            let ingredientsHTML = '';
            for (let i = 1; i <= 20; i++) {
                const ingredient = meal[`strIngredient${i}`];
                const measure = meal[`strMeasure${i}`];
                if (ingredient && ingredient.trim() !== "") {
                    ingredientsHTML += `
                        <div class="flex flex-col p-3.5 bg-brand-sage/5 dark:bg-white/5 border border-brand-sage/10 dark:border-white/5 rounded-2xl transition-all hover:bg-brand-sage/10 dark:hover:bg-white/10">
                            <span class="font-display font-bold text-brand-terracotta dark:text-brand-terracotta text-base md:text-lg tracking-tight">${measure}</span>
                            <span class="text-sm text-brand-slate/80 dark:text-brand-cream/80 font-semibold mt-1 leading-tight">${ingredient}</span>
                        </div>`;
                }
            }

            contentDiv.innerHTML = `
                <article class="fade-in-up bg-white dark:bg-brand-darkCard rounded-[1.5rem] md:rounded-[3rem] overflow-hidden shadow-xl md:shadow-2xl border border-brand-sage/10 dark:border-white/5 w-full transition-colors duration-500">
                    <div class="relative h-64 md:h-[28rem] w-full">
                        <img src="${meal.strMealThumb}" class="w-full h-full object-cover" alt="${meal.strMeal}">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/40 to-transparent"></div>
                        <div class="absolute bottom-5 md:bottom-10 left-5 md:left-10 right-5 md:right-10">
                            <span class="inline-block px-3 py-1 bg-brand-terracotta text-white text-[10px] font-bold uppercase tracking-widest rounded-full mb-2 md:mb-3 shadow-md">${meal.strCategory} | ${meal.strArea}</span>
                            <h2 class="font-display text-4xl md:text-6xl text-white font-extrabold leading-tight drop-shadow-lg">${meal.strMeal}</h2>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-3 border-b border-brand-sage/5 dark:border-white/5 bg-brand-cream/50 dark:bg-black/20 text-center py-4 md:py-5 transition-colors duration-500">
                        <div class="border-r border-brand-sage/10 dark:border-white/10 flex flex-col justify-center">
                            <span class="block text-[10px] uppercase font-bold text-brand-sage dark:text-brand-cream/50 tracking-wider mb-1 transition-colors">Type</span>
                            <span class="font-bold text-brand-slate dark:text-white text-sm md:text-base transition-colors">Main Dish</span>
                        </div>
                        <div class="md:border-r border-brand-sage/10 dark:border-white/10 flex flex-col justify-center">
                            <span class="block text-[10px] uppercase font-bold text-brand-sage dark:text-brand-cream/50 tracking-wider mb-1 transition-colors">Difficulty</span>
                            <span class="font-bold text-brand-slate dark:text-white text-sm md:text-base transition-colors">Medium</span>
                        </div>
                        
                        <div class="col-span-2 md:col-span-1 mt-4 md:mt-0 border-t border-brand-sage/10 dark:border-white/10 md:border-none pt-4 md:pt-0 flex flex-col items-center justify-center">
                            <span class="block text-[10px] uppercase font-bold text-brand-sage dark:text-brand-cream/50 tracking-wider mb-2 transition-colors">Source</span>
                            <a href="${meal.strYoutube}" target="_blank" class="inline-flex items-center gap-2 px-5 py-2 bg-brand-terracotta hover:bg-brand-slate dark:hover:bg-brand-sage text-white rounded-xl font-bold transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5 text-sm md:text-base">
                                <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                                Watch Video
                            </a>
                        </div>
                    </div>

                    <div class="p-5 md:p-12">
                        <div class="flex flex-col lg:flex-row gap-8 md:gap-12">
                            <div class="lg:w-1/3">
                                <h3 class="font-display text-xl md:text-2xl font-bold text-brand-leaf dark:text-brand-sage mb-5 flex items-center gap-3 transition-colors">
                                    <span class="w-1.5 h-6 bg-brand-terracotta rounded-full"></span> Ingredients
                                </h3>
                                <div class="grid grid-cols-2 gap-3">
                                    ${ingredientsHTML}
                                </div>
                            </div>
                            <div class="lg:w-2/3">
                                <h3 class="font-display text-xl md:text-2xl font-bold text-brand-leaf dark:text-brand-sage mb-5 flex items-center gap-3 transition-colors">
                                    <span class="w-1.5 h-6 bg-brand-sage rounded-full"></span> Instructions
                                </h3>
                                <p class="text-brand-slate/80 dark:text-brand-cream/80 leading-relaxed whitespace-pre-line font-medium text-sm md:text-lg transition-colors">
                                    ${meal.strInstructions}
                                </p>
                            </div>
                        </div>
                    </div>
                </article>
            `;

            detailContainer.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function backToList() {
            const backBtnWrapper = document.getElementById('back-btn-wrapper');
            backBtnWrapper.classList.add('hidden');
            backBtnWrapper.classList.remove('flex');

            document.getElementById('recipe-detail-container').classList.add('hidden');
            document.getElementById('recipe-list-container').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.getElementById('search-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                fetchRecipe();
            }
        });
    </script>
</body>
</html>
