<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zest &amp; Zyme | Discover Recipes</title>
    <meta name="description"
        content="Search and discover your next favorite meal with Zest & Zyme. Browse thousands of recipes from around the world.">

    <!-- ── Google Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Quicksand:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- ── Tailwind CSS CDN ── -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        /**
         * Tailwind config: custom brand color palette and font families.
         * darkMode: 'class' means dark mode is toggled by adding/removing
         * the 'dark' class on <html>, not by OS preference alone.
         */
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            sage: '#7C9473',
                            leaf: '#4A6141',
                            terracotta: '#E67E5F',
                            slate: '#2D3436',
                            cream: '#FDFCF8',
                            bg: '#F8FAF9',
                            darkBg: '#121516',
                            darkCard: '#1E2324'
                        }
                    },
                    fontFamily: {
                        display: ['Fredoka', 'sans-serif'],
                        body: ['Quicksand', 'sans-serif']
                    }
                }
            }
        }

        /**
         * Early theme initializer — runs before body paint to prevent flash.
         * Reads saved preference from localStorage, falls back to OS preference.
         */
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <!-- ── Custom CSS Modules ── -->
    <!-- Base styles: scrollbar, body, header states, animations, loader -->
    <link rel="stylesheet" href="css/main.css">
    <!-- Mobile-specific responsive overrides -->
    <link rel="stylesheet" href="css/mobile.css">
</head>

<body class="font-body text-brand-slate bg-brand-bg dark:bg-brand-darkBg dark:text-brand-cream antialiased">

    <!-- ══════════════════════════════════════════
         HEADER — Transitions between:
           - state-initial : full-height centered hero
           - state-active  : sticky top bar with blur
         ══════════════════════════════════════════ -->
    <header id="header-section"
        class="state-initial relative w-full bg-white/0 dark:bg-brand-darkBg/0 border-b border-transparent [&.state-active]:bg-brand-bg/85 [&.state-active]:dark:bg-brand-darkBg/85 [&.state-active]:border-brand-sage/15 [&.state-active]:dark:border-brand-sage/10">

        <!-- ══ Food Sticker Decorations (Desktop Only) ══
             Each sticker uses CSS custom properties to control:
             - --rot: base rotation angle
             - --float-dur: animation cycle duration
             - --float-delay: stagger delay so they don't all bob together
             Positioned around the edges so they don't overlap the search area.
        -->
        <div class="hero-stickers" aria-hidden="true">
            <!-- Top-left cluster -->
            <span class="sticker large wobble"
                style="top:8%;  left:4%;   --rot:-15deg; --float-dur:5s;   --float-delay:0s">🍰</span>
            <span class="sticker small"
                style="top:22%; left:9%;   --rot:10deg;  --float-dur:4.2s; --float-delay:0.5s">🥐</span>
            <span class="sticker medium"
                style="top:60%; left:6%;   --rot:-8deg;  --float-dur:6s;   --float-delay:1.2s">🍕</span>
            <span class="sticker small wobble"
                style="top:78%; left:2%;   --rot:20deg;  --float-dur:4.8s; --float-delay:0.3s">🍩</span>

            <!-- Top-right cluster -->
            <span class="sticker large"
                style="top:7%;  right:5%;  --rot:12deg;  --float-dur:5.5s; --float-delay:0.7s">🎂</span>
            <span class="sticker medium wobble"
                style="top:25%; right:8%;  --rot:-10deg; --float-dur:4.5s; --float-delay:1s">🧁</span>
            <span class="sticker small"
                style="top:55%; right:4%;  --rot:18deg;  --float-dur:6.2s; --float-delay:0.2s">🍓</span>
            <span class="sticker medium"
                style="top:75%; right:7%;  --rot:-5deg;  --float-dur:5.8s; --float-delay:1.5s">🥗</span>

            <!-- Mid-left -->
            <span class="sticker small"
                style="top:42%; left:14%;  --rot:25deg;  --float-dur:4s;   --float-delay:0.8s">🍜</span>
            <span class="sticker medium wobble"
                style="top:88%; left:15%;  --rot:-18deg; --float-dur:5.2s; --float-delay:0.4s">🫐</span>

            <!-- Mid-right -->
            <span class="sticker small"
                style="top:40%; right:13%; --rot:-22deg; --float-dur:3.8s; --float-delay:1.1s">🥑</span>
            <span class="sticker medium"
                style="top:85%; right:16%; --rot:8deg;   --float-dur:5.6s; --float-delay:0.6s">🍋</span>

            <!-- Far corners (very subtle) -->
            <span class="sticker small"
                style="top:5%;  left:22%;  --rot:-30deg; --float-dur:7s;   --float-delay:0.9s; opacity:0.5">🌿</span>
            <span class="sticker small"
                style="top:5%;  right:22%; --rot:28deg;  --float-dur:6.5s; --float-delay:1.3s; opacity:0.5">🌿</span>
            <span class="sticker small"
                style="top:92%; left:35%;  --rot:-12deg; --float-dur:4.6s; --float-delay:0.1s; opacity:0.55">🧄</span>
            <span class="sticker small"
                style="top:92%; right:35%; --rot:15deg;  --float-dur:5s;   --float-delay:1.8s; opacity:0.55">🍯</span>
        </div>

        <!-- Logo & Tagline (hidden after first search) -->
        <div id="logo-container" class="text-center mb-8 md:mb-10 transition-all duration-500 w-full">
            <h1
                class="brand-title font-display text-5xl md:text-7xl font-extrabold text-brand-leaf dark:text-brand-sage uppercase transition-colors">
                Zest &amp; Zyme</h1>
            <p
                class="text-brand-sage mt-2 md:mt-3 font-medium text-base md:text-lg italic dark:text-brand-cream/70 transition-colors">
                Discover your next favorite meal...</p>
        </div>

        <!-- Search Bar Row -->
        <div class="w-full max-w-4xl mx-auto px-4 md:px-0 relative flex justify-center">
            <div class="w-full flex items-center justify-center gap-3 md:gap-4 transition-all duration-500">

                <!-- Back Button (hidden until recipe detail is open) -->
                <div id="back-btn-wrapper" class="relative group hidden flex-shrink-0">
                    <button onclick="backToList()"
                        class="w-12 h-12 md:w-14 md:h-14 flex items-center justify-center bg-white dark:bg-brand-darkCard border-2 border-brand-sage/30 dark:border-white/10 rounded-full shadow-lg hover:shadow-xl text-brand-slate dark:text-brand-cream hover:border-brand-sage dark:hover:border-brand-sage transition-all duration-300 transform hover:-translate-x-1">
                        <svg class="w-6 h-6 md:w-7 md:h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                        </svg>
                    </button>
                    <!-- Tooltip -->
                    <span
                        class="absolute top-full mt-3 left-1/2 -translate-x-1/2 px-3 py-1.5 bg-brand-slate dark:bg-white text-white dark:text-brand-slate text-xs font-bold rounded-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 shadow-xl whitespace-nowrap z-50 pointer-events-none">
                        Back to results
                        <span
                            class="absolute bottom-full left-1/2 -translate-x-1/2 border-[5px] border-transparent border-b-brand-slate dark:border-b-white"></span>
                    </span>
                </div>

                <!-- Search Input + Submit Button -->
                <div class="relative flex-1 max-w-2xl">
                    <div
                        class="relative flex items-center bg-white dark:bg-brand-darkCard border-2 border-brand-sage/30 dark:border-white/10 rounded-full shadow-lg p-1.5 transition-all hover:shadow-xl focus-within:border-brand-sage dark:focus-within:border-brand-sage/60 focus-within:ring-4 focus-within:ring-brand-sage/10">
                        <input type="text" id="search-input" placeholder="Search e.g. cake..."
                            class="w-full pl-5 md:pl-6 pr-3 py-2.5 md:py-3 bg-transparent text-base md:text-lg font-medium text-brand-slate dark:text-white placeholder-brand-slate/40 dark:placeholder-white/40"
                            autocomplete="off">
                        <button onclick="fetchRecipe()"
                            class="h-full px-6 md:px-8 py-2.5 md:py-3 bg-brand-leaf hover:bg-brand-sage dark:hover:bg-brand-sage text-white rounded-full font-bold transition-colors flex items-center justify-center gap-2 flex-shrink-0 text-sm md:text-base">
                            <span id="btn-text">Search</span>
                            <div id="loader" class="loader"></div>
                        </button>
                    </div>

                    <!-- Error Message (shown below search bar) -->
                    <div id="error-message"
                        class="hidden absolute left-0 right-0 top-full mt-4 mx-4 md:mx-0 px-4 py-3 bg-brand-terracotta/10 border border-brand-terracotta/20 text-brand-terracotta rounded-xl text-sm font-bold text-center transition-all shadow-sm">
                    </div>
                </div>

                <!-- Theme Toggle Button (Desktop) -->
                <div id="theme-btn-desktop-wrapper" class="relative group flex-shrink-0">
                    <button id="theme-btn"
                        class="relative overflow-hidden w-12 h-12 md:w-14 md:h-14 flex items-center justify-center bg-white dark:bg-brand-darkCard border-2 border-brand-sage/30 dark:border-white/10 rounded-full shadow-lg transition-all hover:shadow-xl">
                        <!-- Water fill overlay (animated on click) -->
                        <div id="water-level"
                            class="absolute bottom-0 left-0 w-full h-full transform translate-y-full transition-transform duration-[600ms] ease-in-out z-0 rounded-full">
                        </div>

                        <!-- Sun icon (shown in dark mode) -->
                        <svg id="icon-sun"
                            class="w-6 h-6 md:w-7 md:h-7 text-white dark:text-yellow-400 relative z-10 transition-transform duration-500 group-hover:rotate-45 hidden"
                            fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                        </svg>

                        <!-- Moon icon (shown in light mode) -->
                        <svg id="icon-moon"
                            class="w-6 h-6 md:w-7 md:h-7 text-brand-slate relative z-10 transition-transform duration-500 group-hover:-rotate-12"
                            fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                        </svg>
                    </button>
                    <!-- Tooltip -->
                    <span
                        class="absolute top-full mt-3 left-1/2 -translate-x-1/2 px-3 py-1.5 bg-brand-slate dark:bg-white text-white dark:text-brand-slate text-xs font-bold rounded-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 shadow-xl whitespace-nowrap z-50 pointer-events-none">
                        Toggle Theme
                        <span
                            class="absolute bottom-full left-1/2 -translate-x-1/2 border-[5px] border-transparent border-b-brand-slate dark:border-b-white"></span>
                    </span>
                </div>

            </div>
        </div>
    </header>

    <!-- ══════════════════════════════════════════
         MAIN CONTENT AREA
         Containers are hidden/shown by JS
         ══════════════════════════════════════════ -->
    <main class="w-full max-w-5xl mx-auto px-3 md:px-6 pb-20 pt-6">
        <!-- Recipe cards grid (shown after search) -->
        <div id="recipe-list-container" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 md:gap-6">
        </div>

        <!-- Full recipe detail view (shown after clicking a card) -->
        <div id="recipe-detail-container" class="hidden w-full">
            <div id="full-recipe-content" class="w-full"></div>
        </div>
    </main>

    <!-- ══════════════════════════════════════════
         MOBILE PILL THEME TOGGLE
         Only shown on mobile (≤768px) via CSS.
         Fixed at bottom-center of the screen.
         Features: sliding icon + water fill animation.
         ══════════════════════════════════════════ -->
    <button id="mobile-theme-pill" aria-label="Toggle theme">
        <!-- Water fill overlay -->
        <div id="mobile-water-level"></div>

        <!-- Pill track with sliding knob -->
        <div class="mobile-pill-track">
            <!-- Icon knob (slides left ↔ right) -->
            <div id="mobile-pill-knob">
                <!-- Moon SVG (light mode state) -->
                <svg id="mobile-icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
                <!-- Sun SVG (dark mode state) -->
                <svg id="mobile-icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
            </div>
        </div>
    </button>

    <!-- ── JavaScript Modules ── -->
    <!-- Load api.js first: fetchRecipeByName() is used by main.js -->
    <script src="js/api.js"></script>
    <!-- Load main.js after: contains all UI logic and event listeners -->
    <script src="js/main.js"></script>

</body>

</html>
